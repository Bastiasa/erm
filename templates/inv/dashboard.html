<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard</title>
    <link rel="stylesheet" href="/static/inv/dashboard.css?v=999">
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-icon">🏋️</div>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item active" href="/inv/dashboard">
                <span class="icon">📊</span>
                <span class="label">Dashboard</span>
            </a>

            <a class="nav-item" href="/production">
                <span class="icon">🏭</span>
                <span class="label">Production</span>
            </a>

            <a class="nav-item" href="/home/contacts">
                <span class="icon">👥</span>
                <span class="label">Contacts</span>
            </a>

            <a class="nav-item">
                <span class="icon">📁</span>
                <span class="label">Projects</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="logout-link">🚪 Sign Out</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top">
            <div class="page-title">
                <h1>Inventory</h1>
                <p>Manage your materials and stock levels</p>
            </div>
        </header>

        <section class="controls">
            <form class="search-form">
                <input type="text" placeholder="Search materials...">
                <button>🔍</button>
            </form>

            <button class="primary-btn" id="add-material-btn">➕ Add Material</button>

            <form method="post" action="/inv/add" class="add-material-form hidden">
                <input type="text" name="item_name" placeholder="Nombre" required>
                <input type="text" name="description" placeholder="Descripción" required>
                <input type="number" name="quantity" placeholder="Cantidad inicial" required>
                <button type="submit">Guardar</button>
            </form>
        </section>

        <table>
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Description</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        const addBtn = document.getElementById('add-material-btn');
        const addForm = document.querySelector('.add-material-form');

        addBtn.addEventListener('click', () => {
            addForm.classList.toggle('hidden');
        });
    </script>

</body>
</html>
