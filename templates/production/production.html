<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>

    <link rel="stylesheet" href="/static/inv/dashboard.css?v=999">
    <script type="module" src="/static/js/refresh_token.js"></script>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-icon">🏭</div>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" href="/inv/dashboard">
                <span class="icon">📊</span>
                <span class="label">Inventory</span>
            </a>
            <a class="nav-item active" href="/production">
                <span class="icon">🏭</span>
                <span class="label">Production</span>
            </a>
            <a class="nav-item" href="/ctc">
                <span class="icon">👥</span>
                <span class="label">Contacts</span>
            </a>
            <a class="nav-item" href="/projects">
                <span class="icon">📁</span>
                <span class="label">Projects</span>
            </a>
            <a class="nav-item" href="/financery">
                <span class="icon">💵</span>
                <span class="label">Financery</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="logout-link" href="/home/login">🚪 Sign Out</a>
        </div>
    </aside>

    <main class="main-content">

        <header class="header-top">
            <div class="page-title">
                <h1>Production</h1>
                <p>Manage your production projects</p>
            </div>

            <div class="top-bar">
                <div class="username">
                    {{ user.username }}
                </div>
            </div>
        </header>

        <section class="controls">

            <!-- BOTÓN PARA AÑADIR PRODUCCIÓN -->
            <button class="primary-btn" id="add-production-btn">➕ Add Production</button>

            <!-- FORMULARIO (flotante) -->
            <form class="add-material-form" id="production-form">
                <input type="text" id="project_name" placeholder="Project Name" required>
                <input type="text" id="client_name" placeholder="Client Name" required>
                <textarea id="description" placeholder="Description" required></textarea>
                <input type="date" id="delivery_date" required>
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <button type="submit">Save</button>
            </form>

            <!-- BUSCADOR POR CLIENTE -->
            <form class="search-form" onsubmit="event.preventDefault(); searchProduction();">
                <input type="text" id="searchClient" placeholder="Search by client name">
                <button type="submit">🔍</button>
            </form>
        </section>

        <!-- RESULTADOS DE BÚSQUEDA -->
        <table>
            <thead>
                <tr>
                    <th>Project</th>
                    <th>Client</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Delivery Date</th>
                </tr>
            </thead>
            <tbody id="production-table-body">
                <!-- JS llenará esto -->
            </tbody>
        </table>

    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const addBtn = document.getElementById("add-production-btn");
            const form = document.getElementById("production-form");
            const tableBody = document.getElementById("production-table-body");

            addBtn.addEventListener("click", () => form.classList.toggle("active"));

            function getToken() {
                return localStorage.getItem("access_token");
            }

            async function searchProduction() {
                const clientName = document.getElementById("searchClient").value.trim();
                tableBody.innerHTML = "";

                if (!clientName) return;

                try {
                    const res = await fetch(`/production/?client_name=${encodeURIComponent(clientName)}`, {
                        headers: { "Authorization": `Bearer ${getToken()}` }
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.detail || "Error fetching data");
                        return;
                    }

                    data.forEach(item => {
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${item.project_name}</td>
                            <td>${item.client_name}</td>
                            <td>${item.description}</td>
                            <td>${item.status}</td>
                            <td>${item.delivery_date}</td>
                        `;
                        tableBody.appendChild(row);
                    });

                } catch (err) {
                    alert("Server connection error");
                }
            }

            async function createProduction(event) {
                event.preventDefault();

                const payload = {
                    project_name: document.getElementById("project_name").value,
                    client_name: document.getElementById("client_name").value,
                    description: document.getElementById("description").value,
                    delivery_date: document.getElementById("delivery_date").value,
                    status: document.getElementById("status").value
                };

                try {
                    const res = await fetch("/production/add", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${getToken()}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.detail || "Error creating production");
                        return;
                    }

                    alert("Production created successfully!");
                    form.reset();
                    form.classList.remove("active");
                    searchProduction();

                } catch (err) {
                    alert("Server error");
                }
            }

            form.addEventListener("submit", createProduction);

            // Inicialmente no cargamos nada
        });

        // Exponer searchProduction globalmente para el formulario
        function searchProduction() {
            document.querySelector("#production-form").dispatchEvent(new Event('searchProduction'));
        }
    </script>

</body>
</html>
